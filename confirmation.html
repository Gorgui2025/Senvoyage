<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SenVoyage — Confirmation de réservation</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="stripe"></div>

  <!-- ========== NAVBAR ========== -->
  <nav class="navbar">
    <div class="navbar-logo">
      <div class="logo-icon">🚌</div>
      <span>Sen<span class="accent">Voyage</span></span>
    </div>
    <span class="navbar-tagline">Voyagez partout au Sénégal</span>
  </nav>

  <!-- ========== CONTENU ========== -->
  <main class="page-container">

    <!-- Fil d'Ariane -->
    <div class="breadcrumb">
      <a href="index.html">Accueil</a>
      <span>›</span>
      <span>Confirmation</span>
    </div>

    <div class="confirm-wrapper">

      <!-- ---- Bannière de succès ---- -->
      <div class="success-banner">
        <div class="success-icon">✅</div>
        <h1>Réservation confirmée !</h1>
        <p>Votre billet a été réservé avec succès. Bon voyage !</p>
        <div class="booking-number" id="booking-number">SV-2024-----</div>
      </div>

      <!-- ---- Récapitulatif complet ---- -->
      <div class="confirm-card">
        <div class="card-title">📋 Récapitulatif complet</div>
        <div id="confirm-summary">
          <!-- Rempli par JavaScript -->
        </div>
      </div>

      <!-- ---- Actions ---- -->
      <div class="confirm-actions">
        <button id="whatsapp-btn" class="btn btn-whatsapp">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.535 5.858L.057 23.885a.5.5 0 0 0 .606.61l6.162-1.615A11.944 11.944 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.891 0-3.667-.523-5.188-1.432l-.372-.22-3.857 1.011 1.03-3.741-.242-.386A9.955 9.955 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
          Envoyer sur WhatsApp
        </button>
        <button id="print-btn" class="btn btn-print">
          🖨️ Imprimer le billet
        </button>
        <button id="new-booking-btn" class="btn btn-new">
          🔄 Nouvelle réservation
        </button>
      </div>

      <!-- ---- Billet imprimable (visible uniquement à l'impression) ---- -->
      <div class="print-ticket" id="print-ticket" aria-hidden="true">
        <!-- Rempli dynamiquement par JavaScript -->
      </div>

    </div>

  </main>

  <!-- ========== FOOTER ========== -->
  <footer>
    &copy; 2026 <strong>SenVoyage</strong> — Transport inter-régions au Sénégal 🇸🇳
  </footer>

  <!-- Cache-bust : force le rechargement de app.js à chaque déploiement -->
  <script src="app.js?v=3"></script>

  <!-- Script de secours : gère les boutons même si app.js est en cache -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {

      /* --- Bouton Impression --- */
      var printBtn = document.getElementById('print-btn');
      if (printBtn) {
        printBtn.onclick = function () { window.print(); };
      }

      /* --- Bouton WhatsApp --- */
      var waBtn = document.getElementById('whatsapp-btn');
      if (waBtn) {
        waBtn.onclick = function () {
          try {
            var raw = localStorage.getItem('sv_booking');
            if (!raw) { alert('Aucune réservation trouvée.'); return; }
            var b = JSON.parse(raw);
            var t = b.trip, p = b.passenger;

            var months = ['janvier','février','mars','avril','mai','juin',
                          'juillet','août','septembre','octobre','novembre','décembre'];
            var parts = t.date.split('-');
            var dateStr = parseInt(parts[2]) + ' ' + months[parseInt(parts[1]) - 1] + ' ' + parts[0];
            var prix = new Intl.NumberFormat('fr-SN').format(t.totalPrice) + ' FCFA';
            var nbPass = t.passengers > 1 ? t.passengers + ' passagers' : '1 passager';

            var msg = [
              '🎉 *Réservation SenVoyage confirmée !*',
              '',
              '📋 *N° :* ' + b.bookingNumber,
              '🗺️ *Trajet :* ' + t.from + ' → ' + t.to,
              '📅 *Date :* ' + dateStr,
              '🕐 *Départ :* ' + t.departureTime,
              '🚌 *Compagnie :* ' + t.company.name,
              '',
              '👤 *Passager :* ' + p.firstName + ' ' + p.lastName,
              '📞 *Tél :* ' + p.phone,
              '💺 ' + nbPass,
              '',
              '💰 *Prix total :* ' + prix,
              '',
              '_Bon voyage avec SenVoyage ! 🇸🇳_'
            ].join('\n');

            var a = document.createElement('a');
            a.href = 'https://wa.me/?text=' + encodeURIComponent(msg);
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
          } catch (e) {
            console.error('WhatsApp error:', e);
          }
        };
      }

    });
  </script>

</body>
</html>
