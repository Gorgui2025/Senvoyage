<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fond cercle vert -->
  <circle cx="32" cy="32" r="32" fill="#00853F"/>

  <!-- Bande drapeau sénégalais (bas du cercle) -->
  <clipPath id="clip">
    <circle cx="32" cy="32" r="32"/>
  </clipPath>
  <rect x="0" y="54" width="21.3" height="10" fill="#00853F" clip-path="url(#clip)"/>
  <rect x="21.3" y="54" width="21.3" height="10" fill="#FDEF42" clip-path="url(#clip)"/>
  <rect x="42.6" y="54" width="21.4" height="10" fill="#E31B23" clip-path="url(#clip)"/>

  <!-- Lettres SV en jaune -->
  <text
    x="32"
    y="38"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="26"
    font-weight="900"
    letter-spacing="-1"
    fill="#FDEF42"
  >SV</text>

  <!-- Petit bus blanc sous les lettres -->
  <text
    x="32"
    y="52"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Arial"
    font-size="10"
    fill="rgba(255,255,255,0.7)"
  >🚌</text>
</svg>
